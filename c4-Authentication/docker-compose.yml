version: '3.8'

services:
  keycloak:
    container_name: c4-auth-keycloak
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    environment:
      # KC_DB: postgres
      # KC_DB_URL: jdbc:postgresql://c3-db:5432/keycloak # Mở comment khi bạn đã cài đặt database PostgreSQL (nhóm c3)
      # KC_DB_USERNAME: keycloak
      # KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - cloud-net

networks:
  cloud-net:
    external: true
