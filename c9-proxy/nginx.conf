# --- Cấu hình Resolver để Nginx hỏi c6 về các tên miền nội bộ ---
resolver ${IP_C6} valid=30s;

# --- KHỐI 1: DÀNH CHO AUTH (KEYCLOAK) ---
server {
    listen 80;
    server_name auth.azura.io.vn;

    location / {
        set $upstream_auth http://c4.myminicloud.local:8080; 
        proxy_pass $upstream_auth;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443; 

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# --- KHỐI 2: DÀNH CHO SA (Smart Aquarium Frontend - React) ---
server {
    listen 80;
    server_name sa.azura.io.vn;

    location / {
        set $upstream_web http://c1-sa-web.myminicloud.local:80;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket cho Socket.IO (live stream + sensor realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # 24h - giữ kết nối WebSocket
    }
}

# --- KHỐI 2b: DÀNH CHO SA API (Smart Aquarium NestJS Backend) ---
server {
    listen 80;
    server_name api-be.azura.io.vn;

    # Cho phép upload file lên backend
    client_max_body_size 50M;

    location / {
        set $upstream_api http://c2-sa-api.myminicloud.local:3000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket bắt buộc cho Socket.IO
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # 24h - giữ kết nối WebSocket
    }
}

# --- KHỐI 3: DÀNH CHO QUẢN TRỊ (MINIO CONSOLE) ---
server {
    listen 80;
    server_name storage.azura.io.vn;

    location / {
        set $upstream_storage http://c5.myminicloud.local:9001;
        proxy_pass $upstream_storage;

        # --- ĐÂY LÀ "CHÌA KHÓA" ---
        # Thay $host bằng $http_host để MinIO nhận diện đúng tên miền
        proxy_set_header Host $http_host; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-NginX-Proxy true;

        # WebSocket bắt buộc phải có
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect off;
    }
}

# --- KHỐI 4: DÀNH CHO LÕI LƯU TRỮ (MINIO S3 API) ---
server {
    listen 80;
    server_name api-storage.azura.io.vn;

    # Cho phép upload file lớn lên S3 API
    client_max_body_size 100M;
    ignore_invalid_headers off;

    location / {
        # Trỏ vào cổng API 9000 của c5
        set $upstream_api_storage http://c5.myminicloud.local:9000;
        proxy_pass $upstream_api_storage;
        
        # MinIO S3 API cực kỳ nhạy cảm với Header Host
        proxy_set_header Host $http_host; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-NginX-Proxy true;

        # Chặn timeout khi API tải file lớn
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# --- KHỐI 5: DÀNH CHO MONITORING (GRAFANA) ---
server {
    listen 80;
    server_name monitor.azura.io.vn;

    location / {
        set $upstream_monitor http://c8.myminicloud.local:3000;
        proxy_pass $upstream_monitor;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Grafana cần WebSocket cho live charts và alerting
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

