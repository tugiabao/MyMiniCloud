# --- Cấu hình Resolver để Nginx hỏi c6 về các tên miền nội bộ ---
resolver ${IP_C6} valid=30s;

# --- KHỐI 1: DÀNH CHO AUTH (KEYCLOAK) ---
server {
    listen 80;
    server_name auth.azura.io.vn;

    location / {
        set $upstream_auth http://c4.myminicloud.local:8080; 
        proxy_pass $upstream_auth;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443; 

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# --- KHỐI 2: DÀNH CHO SA (APP HỒ CÁ) ---
server {
    listen 80;
    server_name sa.azura.io.vn;

    location / {
        set $upstream_web http://c1.myminicloud.local:80;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        set $upstream_api http://c2.myminicloud.local:8000;
        proxy_pass $upstream_api/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- KHỐI 3: DÀNH CHO STORAGE (MINIO CONSOLE) ---
server {
    listen 80;
    server_name storage.azura.io.vn;

    # Cho phép upload file lên tới 100MB (phù hợp cho ảnh/video từ ESP32)
    client_max_body_size 100M;

    location / {
        # Trỏ vào cổng Console 9001 của c5
        set $upstream_storage http://c5.myminicloud.local:9001;
        proxy_pass $upstream_storage;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # --- Cấu hình quan trọng cho MinIO Console (WebSocket) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Tránh lỗi kẹt timeout khi đang xem danh sách file lớn
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}