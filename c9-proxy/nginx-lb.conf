# ============================================================
# NGINX LOAD BALANCING CONFIGURATION
# Dành cho Oracle Cloud - Cân bằng tải 3 instance Backend API
# ============================================================

# --- Cấu hình Resolver ---
resolver ${IP_C6} valid=30s;

# ============================================================
# UPSTREAM: Cân bằng tải Round-Robin cho Backend API
# Nginx sẽ tự động xoay vòng request giữa 3 instance
# ============================================================
upstream backend_pool {
    # ip_hash đảm bảo cùng 1 client luôn kết nối tới cùng 1 instance
    # (Bắt buộc cho WebSocket/Socket.IO)
    ip_hash;

    server 172.19.0.3:3000   max_fails=2 fail_timeout=5s;  # c2-sa-api (instance gốc)
    server 172.19.0.21:3000  max_fails=2 fail_timeout=5s;  # c2-api-1
    server 172.19.0.22:3000  max_fails=2 fail_timeout=5s;  # c2-api-2
    server 172.19.0.23:3000  max_fails=2 fail_timeout=5s;  # c2-api-3
}

# --- KHỐI 1: DÀNH CHO AUTH (KEYCLOAK) ---
server {
    listen 80;
    server_name auth.azura.io.vn;

    location / {
        set $upstream_auth http://c4.myminicloud.local:8080; 
        proxy_pass $upstream_auth;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443; 

        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# --- KHỐI 2: DÀNH CHO SA (Smart Aquarium Frontend - React) ---
server {
    listen 80;
    server_name sa.azura.io.vn;

    location / {
        set $upstream_web http://c1-sa-web.myminicloud.local:80;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket cho Socket.IO (live stream + sensor realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # 24h - giữ kết nối WebSocket
    }
}

# --- KHỐI 2b: DÀNH CHO SA API - LOAD BALANCED ---
server {
    listen 80;
    server_name api-be.azura.io.vn;

    # Cho phép upload file lên backend
    client_max_body_size 50M;

    location / {
        # ✅ Trỏ vào upstream pool thay vì 1 instance duy nhất
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # ⚡ Fast Failover: Khi 1 instance chết, chuyển sang instance khác trong 2 giây
        proxy_connect_timeout 2s;                                    # Chờ kết nối tối đa 2 giây
        proxy_next_upstream error timeout http_502 http_503 http_504; # Tự động thử instance khác khi lỗi
        proxy_next_upstream_timeout 5s;                               # Tổng thời gian failover tối đa 5 giây
        proxy_next_upstream_tries 3;                                  # Thử tối đa 3 instance khác

        # WebSocket bắt buộc cho Socket.IO
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # 24h - giữ kết nối WebSocket
    }
}

# --- KHỐI 3: DÀNH CHO QUẢN TRỊ (MINIO CONSOLE) ---
server {
    listen 80;
    server_name storage.azura.io.vn;

    location / {
        set $upstream_storage http://c5.myminicloud.local:9001;
        proxy_pass $upstream_storage;

        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-NginX-Proxy true;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect off;
    }
}

# --- KHỐI 4: DÀNH CHO LÕI LƯU TRỮ (MINIO S3 API) ---
server {
    listen 80;
    server_name api-storage.azura.io.vn;

    client_max_body_size 100M;
    ignore_invalid_headers off;

    location / {
        set $upstream_api_storage http://c5.myminicloud.local:9000;
        proxy_pass $upstream_api_storage;
        
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-NginX-Proxy true;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# --- KHỐI 5: DÀNH CHO MONITORING (GRAFANA) ---
server {
    listen 80;
    server_name monitor.azura.io.vn;

    location / {
        set $upstream_monitor http://c8.myminicloud.local:3000;
        proxy_pass $upstream_monitor;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
