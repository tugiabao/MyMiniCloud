services:
  # --- c6: DNS Server ---
  c6:
    image: baobao04/myminicloud-c6:latest
    build: ./c6-dns
    container_name: c6
    restart: always
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - IP_C1=${IP_C1}
      - IP_C2=${IP_C2}
      - IP_C3=${IP_C3}
      - IP_C4=${IP_C4}
      - IP_C5=${IP_C5}
      - IP_C6=${IP_C6}
      - IP_C7=${IP_C7}
      - IP_C8=${IP_C8}
      - IP_C9=${IP_C9}
      - IP_C1_BLOG=${IP_C1_BLOG}
      - IP_CADVISOR=${IP_CADVISOR}
      - IP_C1_PRACTICE=${IP_C1_PRACTICE}
    networks:
      cloud-net:
        ipv4_address: "${IP_C6}"
    healthcheck:
      # Lệnh này kiểm tra xem DNS có thực sự trả lời hay chưa
      test: [ "CMD", "nslookup", "localhost", "127.0.0.1" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- c1-sa-web: Web Server (React + Vite, Smart Aquarium Frontend) ---
  c1-sa-web:
    image: baobao04/myminicloud-c1-sa-web:latest
    build:
      context: ./c1-sa-web
      args:
        VITE_API_URL: https://api-be.azura.io.vn
    container_name: c1-sa-web
    restart: always
    networks:
      cloud-net:
        ipv4_address: "${IP_C1}"
    dns:
      - "${IP_C6}"
    depends_on:
      - c6

  # --- c1-blog: Blog cá nhân (Static Site) ---
  c1-blog:
    image: baobao04/myminicloud-c1-blog:latest
    build: ./c1-blog
    container_name: c1-blog
    restart: always
    networks:
      cloud-net:
        ipv4_address: "${IP_C1_BLOG}"
    dns:
      - "${IP_C6}"
    depends_on:
      - c6

  # --- c2-sa-api: Application Server (NestJS, Smart Aquarium Backend) ---
  c2-sa-api:
    image: baobao04/myminicloud-c2-sa-api:latest
    build: ./c2-sa-api
    container_name: c2-sa-api
    restart: always
    env_file:
      - .env
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - TZ=Asia/Ho_Chi_Minh
      - PORT_BACKEND=3000
    networks:
      cloud-net:
        ipv4_address: "${IP_C2}"
    dns:
      - "${IP_C6}"
    depends_on:
      - c6

  # --- c3: Database Server ---
  c3:
    image: "${DB_IMAGE}"
    container_name: c3
    restart: always
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "myminicloud_db"
      TZ: "${TIMEZONE}"
    volumes:
      - ./c3-db/data:/var/lib/postgresql/data
    networks:
      cloud-net:
        ipv4_address: "${IP_C3}"

  # --- c3-dbview: Database GUI (CloudBeaver by DBeaver, bật khi cần) ---
  c3-dbview:
    image: dbeaver/cloudbeaver:latest
    container_name: c3-dbview
    restart: "no"
    profiles:
      - tools
    ports:
      - "8978:8978"
    volumes:
      - ./c3-dbview/data:/opt/cloudbeaver/workspace
    networks:
      cloud-net:
        ipv4_address: "${IP_C3_DBVIEW}"
    dns:
      - "${IP_C6}"


  # --- c4: Authentication Server ---
  c4:
    image: quay.io/keycloak/keycloak:latest
    container_name: c4
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://c3:5432/myminicloud_db
      KC_DB_USERNAME: "admin"
      KC_DB_PASSWORD: "mysecretpassword"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${AUTH_ADMIN}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${AUTH_PASSWORD}"
      KC_PROXY_HEADERS: "xforwarded" # Phiên bản Keycloak mới bắt buộc dùng tham số này để nhận diện X-Forwarded-Proto từ Nginx
      KC_HOSTNAME: "auth.azura.io.vn" # Thay vì .local để bắt buộc Keycloak dùng Public Domain
      KC_HTTP_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms128m -Xmx512m" # Giới hạn JVM Heap (Linux swap sẽ hỗ trợ khi RAM vật lý hết)
    depends_on:
      - c3
    networks:
      cloud-net:
        ipv4_address: "${IP_C4}"
    dns:
      - "${IP_C6}"

 # --- c5: Object Storage (Kho lưu trữ chung cho SA) ---
  c5:
    # Hạ cấp xuống cuối năm 2023 để lấy lại Giao Diện Administrator Console
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: c5
    restart: always
    volumes:
      - ./c5-storage/data:/data
    environment:
      MINIO_ROOT_USER: "${STORAGE_USER}"
      MINIO_ROOT_PASSWORD: "${STORAGE_PASSWORD}"
      # Quan trọng: Giúp MinIO Console hoạt động đúng khi qua Reverse Proxy/Cloudflare
      MINIO_BROWSER_REDIRECT_URL: "https://storage.azura.io.vn"
      MINIO_SERVER_URL: "https://api-storage.azura.io.vn"
    # Tách biệt: API chạy cổng 9000, Console chạy cổng 9001 (STORAGE_PORT_CONSOLE nên là 9001)
    command: server /data --console-address ":9001" --address ":9000"
    networks:
      cloud-net:
        ipv4_address: "${IP_C5}"
    dns:
      - "${IP_C6}"
    depends_on:
      c6:
        condition: service_healthy
  # --- c7: Prometheus (Bộ thu thập metrics) ---
  c7:
    image: prom/prometheus:latest
    container_name: c7
    restart: always
    volumes:
      - ./c7-monitor/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./c7-monitor/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      cloud-net:
        ipv4_address: "${IP_C7}"
    dns:
      - "${IP_C6}"

  # --- c8: Grafana (Bảng điều khiển trực quan) ---
  c8:
    image: grafana/grafana:latest
    container_name: c8
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=https://monitor.azura.io.vn
    volumes:
      - ./c8-logging/data:/var/lib/grafana
    networks:
      cloud-net:
        ipv4_address: "${IP_C8}"
    dns:
      - "${IP_C6}"

  # --- c9: Reverse Proxy ---
  c9:
    image: baobao04/myminicloud-c9:latest
    build: ./c9-proxy
    container_name: c9
    restart: always
    environment:
      - IP_C6=${IP_C6}
    ports:
      - "80:80"
    networks:
      cloud-net:
        ipv4_address: "${IP_C9}"
    dns:
      - "${IP_C6}"
    depends_on:
      - c1-sa-web
      - c2-sa-api
      - c4
      - c5
      - c8
  c10:
    image: cloudflare/cloudflared:latest
    container_name: c10
    restart: always
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --protocol http2 run
    networks:
      cloud-net:
        ipv4_address: "${IP_C10}"

  # --- c1-practice: AI Pronunciation Practice (React + Gemini AI) ---
  c1-practice:
    image: baobao04/myminicloud-c1-practice:latest
    build:
      context: ./c1-practice
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    container_name: c1-practice
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DB_HOST=c3
      - DB_NAME=myminicloud_db
      - DB_USER=admin
      - DB_PASSWORD=mysecretpassword
      - MINIO_ENDPOINT=c5
      - MINIO_ACCESS_KEY=${STORAGE_USER}
      - MINIO_SECRET_KEY=${STORAGE_PASSWORD}
      - PORT=3000
    networks:
      cloud-net:
        ipv4_address: "${IP_C1_PRACTICE}"
    dns:
      - "${IP_C6}"
    depends_on:
      c6:
        condition: service_healthy
      c3:
        condition: service_started
      c5:
        condition: service_started

  # --- cadvisor: Container Resource Monitor ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    privileged: true # Cần thiết trên Oracle Cloud để đọc CPU/Network metrics
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /proc:/host/proc:ro # Cho phép đọc thông tin tiến trình (CPU metrics)
    command:
      - '--housekeeping_interval=30s' # Giảm tần suất quét để tiết kiệm RAM
      - '--docker_only=true'          # Chỉ theo dõi Docker containers
      - '--disable_metrics=percpu,sched,tcp,udp,hugetlb,referenced_memory' # Bỏ metrics không cần
    networks:
      cloud-net:
        ipv4_address: "${IP_CADVISOR}"
    dns:
      - "${IP_C6}"

networks:
  cloud-net:
    name: "${NETWORK_NAME}"
    driver: bridge
    ipam:
      config:
        - subnet: "${SUBNET_RANGE}"
