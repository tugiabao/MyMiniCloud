<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MyMiniCloud - SA Auth Test</title>
    <!-- Bắt buộc dùng CDN bản mới nhất vì Máy chủ Keycloak bản mới (24+) đã xóa file js nội bộ -->
    <script src="https://cdn.jsdelivr.net/npm/keycloak-js@latest/dist/keycloak.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        .btn-logout { background: #ff4757; color: white; }
        .btn-upload { background: #2f3542; color: white; cursor: not-allowed; opacity: 0.5; }
        #user-info { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🐟 Smart Aquarium - Auth Test</h2>
        <div id="auth-status">Đang kiểm tra xác thực...</div>
        
        <div id="user-info" style="display: none;">
            <p><strong>Chào, <span id="user-name"></span>!</strong></p>
            <p>Email: <span id="user-email"></span></p>
            <hr>
            <button onclick="keycloak.logout()" class="btn-logout">Đăng xuất</button>
            <br><br>
            <!-- Khu vực tải file -->
            <div style="background: #e1f5fe; padding: 15px; border-radius: 8px;">
                <h4 style="margin-top: 0;">Gửi ảnh lên Cloud Storage</h4>
                <input type="file" id="file-input" accept="image/*" style="margin-bottom: 10px;">
                <br>
                <button id="upload-btn" class="btn-upload" style="cursor: pointer; opacity: 1;">🚀 Tải ảnh lên C5 Thử Nghiệm</button>
                <p id="upload-status" style="font-size: 0.9em; font-weight: bold;"></p>
                <img id="preview-img" src="" style="max-width: 100%; height: auto; display: none; margin-top: 10px; border-radius: 5px;" />
            </div>
        </div>
    </div>

    <script>
        const keycloak = new Keycloak({
            url: 'https://auth.azura.io.vn',
            realm: 'myminicloud-sa',
            clientId: 'sa-web' // Client ID bạn vừa tạo trong Keycloak
        });

        keycloak.init({ 
            onLoad: 'check-sso', // Tắt ép buộc đăng nhập để ngừng vòng lặp
            pkceMethod: 'S256',
            redirectUri: 'https://sa.azura.io.vn/',
            checkLoginIframe: false 
        }).then(authenticated => {
            if (authenticated) {
                document.getElementById('auth-status').innerText = "✅ Đã đăng nhập thành công!";
                document.getElementById('user-info').style.display = "block";
                document.getElementById('user-name').innerText = keycloak.tokenParsed.name || keycloak.tokenParsed.preferred_username;
                document.getElementById('user-email').innerText = keycloak.tokenParsed.email || "Không có email";
                
                // In Token ra console để bạn "chiêm ngưỡng" thành quả
                console.log("Token của bạn nè:", keycloak.token);
            } else {
                document.getElementById('auth-status').innerHTML = '⚠️ Chưa đăng nhập. <button onclick="keycloak.login()">Đăng nhập ngay</button>';
            }
        }).catch((err) => {
            console.error("LỖI INIT KEYCLOAK CHI TIẾT:", err);
            document.getElementById('auth-status').innerText = "❌ Lỗi xác thực. Hãy mở F12 -> Console để xem chi tiết lõi đỏ!";
        });

        // --- BẮT ĐẦU LOGIC UPLOAD HÌNH ẢNH LÊN S3 ---
        document.getElementById('upload-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('file-input');
            const statusText = document.getElementById('upload-status');
            const previewImg = document.getElementById('preview-img');

            if (!fileInput.files.length) {
                statusText.innerText = "Vui lòng chọn 1 ảnh!";
                statusText.style.color = "red";
                return;
            }

            const file = fileInput.files[0];
            const bucketName = "aquarium-data"; // Bucket mẫu mà bạn vừa thao tác
            
            // Xóa dấu tiếng Việt, ký tự lạ để làm tên an toàn
            const safeFileName = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.\-]/g, "_");
            const minioApiUrl = `https://api-storage.azura.io.vn/${bucketName}/${safeFileName}`;

            statusText.innerText = "⏳ Đang tải lên Lõi C5...";
            statusText.style.color = "blue";
            previewImg.style.display = "none";

            try {
                // MinIO S3 bản thân nó chấp nhận mã Keycloak JWT như một lệnh PUT hợp lệ 
                // (nếu đã cấu hình Identity Providers OpenID)
                const response = await fetch(minioApiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${keycloak.token}`,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (response.ok) {
                    statusText.innerText = `✅ Tải lên thành công! File lưu tại: ${safeFileName}`;
                    statusText.style.color = "green";
                    
                    // Hiện ảnh demo (Nếu Bucket public read thì url này sẽ xem được)
                    previewImg.src = minioApiUrl;
                    previewImg.style.display = "block";
                } else {
                    const errMsg = await response.text();
                    console.error("Lỗi từ MinIO:", errMsg);
                    statusText.innerText = `❌ Lỗi tải lên: Bị chặn quyền hoặc Bucket không đúng. (Mã: ${response.status})`;
                    statusText.style.color = "red";
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                statusText.innerText = `❌ Không thể đẩy tới Storage API (Lỗi mạng HTTPS - F12 để xem)`;
                statusText.style.color = "red";
            }
        });
        // --- KẾT THÚC LOGIC UPLOAD ---
    </script>
</body>
</html>
