<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MyMiniCloud - SA Auth Test</title>
    <!-- Bắt buộc dùng CDN bản mới nhất vì Máy chủ Keycloak bản mới (24+) đã xóa file js nội bộ -->
    <script src="https://cdn.jsdelivr.net/npm/keycloak-js@latest/dist/keycloak.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        .btn-logout { background: #ff4757; color: white; }
        .btn-upload { background: #2f3542; color: white; cursor: not-allowed; opacity: 0.5; }
        #user-info { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🐟 Smart Aquarium - Auth Test</h2>
        <div id="auth-status">Đang kiểm tra xác thực...</div>
        
        <div id="user-info" style="display: none;">
            <p><strong>Chào, <span id="user-name"></span>!</strong></p>
            <p>Email: <span id="user-email"></span></p>
            <hr>
            <button onclick="keycloak.logout()" class="btn-logout">Đăng xuất</button>
            <button class="btn-upload" title="Sẽ triển khai ở bước c5">Tải ảnh hồ cá lên Cloud (c5)</button>
        </div>
    </div>

    <script>
        const keycloak = new Keycloak({
            url: 'https://auth.azura.io.vn',
            realm: 'myminicloud-sa',
            clientId: 'sa-web' // Client ID bạn vừa tạo trong Keycloak
        });

        keycloak.init({ 
            onLoad: 'check-sso', // Tắt ép buộc đăng nhập để ngừng vòng lặp
            pkceMethod: 'S256',
            redirectUri: 'https://sa.azura.io.vn/',
            checkLoginIframe: false 
        }).then(authenticated => {
            if (authenticated) {
                document.getElementById('auth-status').innerText = "✅ Đã đăng nhập thành công!";
                document.getElementById('user-info').style.display = "block";
                document.getElementById('user-name').innerText = keycloak.tokenParsed.name || keycloak.tokenParsed.preferred_username;
                document.getElementById('user-email').innerText = keycloak.tokenParsed.email || "Không có email";
                
                // In Token ra console để bạn "chiêm ngưỡng" thành quả
                console.log("Token của bạn nè:", keycloak.token);
            } else {
                document.getElementById('auth-status').innerHTML = '⚠️ Chưa đăng nhập. <button onclick="keycloak.login()">Đăng nhập ngay</button>';
            }
        }).catch((err) => {
            console.error("LỖI INIT KEYCLOAK CHI TIẾT:", err);
            document.getElementById('auth-status').innerText = "❌ Lỗi xác thực. Hãy mở F12 -> Console để xem chi tiết lõi đỏ!";
        });
    </script>
</body>
</html>
